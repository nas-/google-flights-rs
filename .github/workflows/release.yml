name: Release

# Publishes the Rust crate to crates.io and the Python package to PyPI when a
# `v*` tag is pushed (e.g. `v0.2.0`). The crate is published first so the
# Python sdist can resolve `gflights` from crates.io. PyPI upload uses Trusted
# Publishing (OIDC) via the `pypi` environment — no API token stored.
#
# Build needs no system protoc: build.rs uses a vendored protoc binary.
# Wheels are abi3 (one wheel per platform, CPython 3.10+).

on:
  push:
    tags: ["v*"]
  # Allow manual re-runs (e.g. to finish a release whose wheel/PyPI jobs failed
  # after the crate was already published). Reads the version from Cargo.toml.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  crate:
    name: Publish crate to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish gflights (skip if version already on crates.io)
        # Idempotent: a manual re-run to finish wheels/PyPI must not fail here
        # just because the crate version is already published.
        # Token is passed via env (CARGO_REGISTRY_TOKEN); `--token` is deprecated.
        run: |
          VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          if curl -fsS -H "User-Agent: gflights-release-ci" \
               "https://crates.io/api/v1/crates/gflights/$VER" >/dev/null 2>&1; then
            echo "gflights $VER already on crates.io — skipping publish."
          else
            cargo publish -p gflights --locked
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  wheels:
    name: Wheels (${{ matrix.platform.os }} / ${{ matrix.platform.target }})
    needs: crate
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { os: ubuntu-latest,  target: x86_64 }
          - { os: windows-latest, target: x64 }
          # macOS arm64 only. The Intel (macos-13/x86_64) runner is scarce and
          # being wound down; Intel-Mac users fall back to the published sdist.
          - { os: macos-latest,   target: aarch64 }
    steps:
      - uses: actions/checkout@v4
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          manylinux: auto
          rust-toolchain: stable
          args: --release --out dist -m gflights-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: dist

  sdist:
    name: Build sdist
    needs: crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          rust-toolchain: stable
          args: --out dist -m gflights-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist

  pypi:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
